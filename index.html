<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Camila 💖</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:black;
  font-family:Arial, sans-serif;
}

h1{
  position:absolute;
  top:20px;
  width:100%;
  text-align:center;
  font-size:38px;
  color:#ff4da6;
  text-shadow:0 0 20px #ff1a8c,0 0 40px #ff66cc;
  z-index:10;
}

button{
  position:absolute;
  bottom:30px;
  left:50%;
  transform:translateX(-50%);
  padding:12px 25px;
  font-size:16px;
  border:none;
  border-radius:30px;
  background:#ff4da6;
  color:white;
  cursor:pointer;
  box-shadow:0 0 20px #ff1a8c;
  z-index:10;
}

canvas{
  display:block;
}
</style>
</head>
<body>

<h1>Para Camila 💖 Te Amo Hoy y Siempre</h1>
<button onclick="toggleMusic()">🎵 Música</button>
<canvas id="canvas"></canvas>

<audio id="music" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3?filename=romantic-love-112191.mp3" type="audio/mpeg">
</audio>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];
let hearts = [];
let meteors = [];
let explosions = [];

class Star {
  constructor(){
    this.distance = Math.random()*300;
    this.angle = Math.random()*Math.PI*2;
    this.radius = Math.random()*1.5;
    this.speed = 0.0007 + Math.random()*0.001;
  }
  update(){ this.angle += this.speed; }
  draw(){
    const x = canvas.width/2 + Math.cos(this.angle)*this.distance;
    const y = canvas.height/2 + Math.sin(this.angle)*this.distance;
    ctx.beginPath();
    ctx.arc(x,y,this.radius,0,Math.PI*2);
    ctx.fillStyle="rgba(255,105,180,0.8)";
    ctx.fill();
  }
}

for(let i=0;i<1500;i++){ particles.push(new Star()); }

for(let i=0;i<30;i++){
  hearts.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    size:15+Math.random()*15,
    speed:0.5+Math.random()
  });
}

function createMeteor(){
  meteors.push({
    x:Math.random()*canvas.width,
    y:0,
    length:80+Math.random()*80,
    speed:4+Math.random()*4
  });
}
setInterval(createMeteor,2000);

function drawPlanet(){
  const cx = canvas.width/2;
  const cy = canvas.height/2;

  let gradient = ctx.createRadialGradient(cx,cy,20,cx,cy,120);
  gradient.addColorStop(0,"#ff66cc");
  gradient.addColorStop(1,"#33001a");

  ctx.beginPath();
  ctx.arc(cx,cy,100,0,Math.PI*2);
  ctx.fillStyle=gradient;
  ctx.shadowBlur=60;
  ctx.shadowColor="#ff1a8c";
  ctx.fill();
  ctx.shadowBlur=0;
}

function drawHearts(){
  hearts.forEach(h=>{
    ctx.font=h.size+"px Arial";
    ctx.fillText("💖",h.x,h.y);
    h.y -= h.speed;
    if(h.y < -20){
      h.y = canvas.height+20;
      h.x = Math.random()*canvas.width;
    }
  });
}

function drawMeteors(){
  meteors.forEach((m,i)=>{
    ctx.beginPath();
    ctx.moveTo(m.x,m.y);
    ctx.lineTo(m.x-m.length,m.y+m.length);
    ctx.strokeStyle="white";
    ctx.lineWidth=2;
    ctx.stroke();
    m.x -= m.speed;
    m.y += m.speed;
    if(m.y > canvas.height){ meteors.splice(i,1); }
  });
}

function createExplosion(x,y){
  for(let i=0;i<20;i++){
    explosions.push({
      x:x,
      y:y,
      dx:(Math.random()-0.5)*6,
      dy:(Math.random()-0.5)*6,
      life:60
    });
  }
}

function drawExplosions(){
  explosions.forEach((p,i)=>{
    ctx.font="20px Arial";
    ctx.fillText("❤️",p.x,p.y);
    p.x+=p.dx;
    p.y+=p.dy;
    p.life--;
    if(p.life<=0){ explosions.splice(i,1); }
  });
}

function animate(){
  ctx.fillStyle="rgba(0,0,0,0.2)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  particles.forEach(p=>{ p.update(); p.draw(); });
  drawPlanet();
  drawHearts();
  drawMeteors();
  drawExplosions();

  requestAnimationFrame(animate);
}
animate();

function toggleMusic(){
  const music = document.getElementById("music");
  if(music.paused){ music.play(); }
  else{ music.pause(); }
}

canvas.addEventListener("click",(e)=>{
  createExplosion(e.clientX,e.clientY);
});

window.addEventListener("resize",()=>{
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>

</body>
</html>
